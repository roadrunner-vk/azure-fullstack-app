name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/deploy.yml"

permissions:
  id-token: write
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/roadrunner-vk/azure-fullstack-app
  RESOURCE_GROUP: rg-azure-fullstack-app

jobs:
  deploy-backend:
    name: Build & deploy backend
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push image
        run: |
          docker build -t ${{ env.IMAGE_PREFIX }}/backend:${{ github.sha }} ./backend
          docker push ${{ env.IMAGE_PREFIX }}/backend:${{ github.sha }}

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name ca-backend \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.IMAGE_PREFIX }}/backend:${{ github.sha }}

  deploy-frontend:
    name: Build & deploy frontend
    runs-on: ubuntu-latest
    needs: deploy-backend
    permissions:
      id-token: write
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push image
        run: |
          docker build -t ${{ env.IMAGE_PREFIX }}/frontend:${{ github.sha }} ./frontend
          docker push ${{ env.IMAGE_PREFIX }}/frontend:${{ github.sha }}

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name ca-frontend \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.IMAGE_PREFIX }}/frontend:${{ github.sha }}
